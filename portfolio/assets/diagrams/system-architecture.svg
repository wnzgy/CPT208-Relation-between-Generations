<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background: #0f172a;">
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">TimeLens System Architecture</text>
  
  <!-- Layers background -->
  <rect x="50" y="70" width="170" height="400" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="240" y="70" width="170" height="400" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="430" y="70" width="170" height="400" rx="10" fill="#1e293b" stroke="#334155"/>
  <rect x="620" y="70" width="130" height="400" rx="10" fill="#1e293b" stroke="#334155"/>
  
  <!-- Layer titles -->
  <text x="135" y="100" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="bold">Frontend</text>
  <text x="325" y="100" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="bold">Interaction</text>
  <text x="515" y="100" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="bold">Data</text>
  <text x="685" y="100" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="bold">Hardware</text>
  
  <!-- Frontend Layer -->
  <rect x="70" y="130" width="130" height="40" rx="8" fill="#312e81"/>
  <text x="135" y="155" text-anchor="middle" fill="#fff" font-size="11">React 19</text>
  
  <rect x="70" y="180" width="130" height="40" rx="8" fill="#312e81"/>
  <text x="135" y="205" text-anchor="middle" fill="#fff" font-size="11">Three.js / R3F</text>
  
  <rect x="70" y="230" width="130" height="40" rx="8" fill="#312e81"/>
  <text x="135" y="255" text-anchor="middle" fill="#fff" font-size="11">Tailwind CSS 4</text>
  
  <rect x="70" y="280" width="130" height="40" rx="8" fill="#312e81"/>
  <text x="135" y="305" text-anchor="middle" fill="#fff" font-size="11">Vite</text>
  
  <!-- Interaction Layer -->
  <rect x="260" y="130" width="130" height="40" rx="8" fill="#1e3a5f"/>
  <text x="325" y="155" text-anchor="middle" fill="#fff" font-size="11">Web NFC API</text>
  
  <rect x="260" y="180" width="130" height="40" rx="8" fill="#1e3a5f"/>
  <text x="325" y="205" text-anchor="middle" fill="#fff" font-size="11">QR Scanner</text>
  
  <rect x="260" y="230" width="130" height="40" rx="8" fill="#1e3a5f"/>
  <text x="325" y="255" text-anchor="middle" fill="#fff" font-size="11">Touch Events</text>
  
  <rect x="260" y="280" width="130" height="40" rx="8" fill="#1e3a5f"/>
  <text x="325" y="305" text-anchor="middle" fill="#fff" font-size="11">Haptic Feedback</text>
  
  <!-- Data Layer -->
  <rect x="450" y="130" width="130" height="40" rx="8" fill="#3f2e18"/>
  <text x="515" y="155" text-anchor="middle" fill="#fff" font-size="11">LocalStorage</text>
  
  <rect x="450" y="180" width="130" height="40" rx="8" fill="#3f2e18"/>
  <text x="515" y="205" text-anchor="middle" fill="#fff" font-size="11">Memory Schema</text>
  
  <rect x="450" y="230" width="130" height="40" rx="8" fill="#3f2e18"/>
  <text x="515" y="255" text-anchor="middle" fill="#fff" font-size="11">Messages</text>
  
  <!-- Hardware Layer -->
  <rect x="635" y="130" width="100" height="40" rx="8" fill="#451a1a"/>
  <text x="685" y="155" text-anchor="middle" fill="#fff" font-size="10">NFC Tags</text>
  
  <rect x="635" y="180" width="100" height="40" rx="8" fill="#451a1a"/>
  <text x="685" y="205" text-anchor="middle" fill="#fff" font-size="10">Smartphone</text>
  
  <rect x="635" y="230" width="100" height="40" rx="8" fill="#451a1a"/>
  <text x="685" y="255" text-anchor="middle" fill="#fff" font-size="10">Keepsakes</text>
  
  <!-- Arrows between layers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Bidirectional arrows -->
  <line x1="220" y1="150" x2="240" y2="150" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="160" x2="220" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="410" y1="150" x2="430" y2="150" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="160" x2="410" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="600" y1="150" x2="620" y2="150" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="160" x2="600" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- User flow at bottom -->
  <text x="400" y="380" text-anchor="middle" fill="#94a3b8" font-size="12">User Flow: Tap NFC → Scan → Unlock → View 3D → Message → Save</text>
  
  <!-- Browser label -->
  <rect x="50" y="420" width="700" height="50" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="450" text-anchor="middle" fill="#fff" font-size="14">Web Browser (Chrome on Android / Safari on iOS)</text>
</svg>