<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 640" style="background: #f1f5f9;">
  <!-- Phone frame -->
  <rect x="10" y="10" width="300" height="620" rx="30" fill="#0f172a"/>
  <rect x="20" y="30" width="280" height="580" rx="20" fill="#f8fafc"/>
  
  <!-- Header -->
  <text x="40" y="70" fill="#0f172a" font-size="28" font-weight="bold">Record</text>
  <text x="40" y="95" fill="#4f46e5" font-size="10" letter-spacing="2">ARCHIVE LEGACY</text>
  
  <!-- Storyteller card -->
  <rect x="40" y="115" width="240" height="80" rx="15" fill="#fff" stroke="#e2e8f0"/>
  <text x="55" y="140" fill="#4f46e5" font-size="9" font-weight="bold">CURRENT STORYTELLER</text>
  <text x="55" y="165" fill="#0f172a" font-size="14" font-weight="bold">Grandparent</text>
  <text x="55" y="185" fill="#64748b" font-size="10">Recording a new keepsake story</text>
  
  <!-- Quick templates -->
  <text x="40" y="220" fill="#94a3b8" font-size="9">Quick fill templates</text>
  <rect x="40" y="230" width="120" height="30" rx="15" fill="#fff" stroke="#e2e8f0"/>
  <text x="55" y="250" fill="#334155" font-size="10">Sewing Box</text>
  <rect x="170" y="230" width="110" height="30" rx="15" fill="#fff" stroke="#e2e8f0"/>
  <text x="185" y="250" fill="#334155" font-size="10">Train Ticket</text>
  
  <!-- Form -->
  <text x="55" y="295" fill="#94a3b8" font-size="8">ITEM NAME</text>
  <rect x="40" y="305" width="240" height="45" rx="15" fill="#fff" stroke="#e2e8f0"/>
  <text x="55" y="333" fill="#0f172a" font-size="14">Grandma's Sewing Box</text>
  
  <text x="55" y="370" fill="#94a3b8" font-size="8">YEAR</text>
  <rect x="40" y="380" width="240" height="45" rx="15" fill="#fff" stroke="#e2e8f0"/>
  <text x="55" y="408" fill="#0f172a" font-size="14">1978</text>
  
  <text x="55" y="445" fill="#94a3b8" font-size="8">THE STORY</text>
  <rect x="40" y="455" width="240" height="80" rx="15" fill="#fff" stroke="#e2e8f0"/>
  <text x="55" y="480" fill="#0f172a" font-size="12">This small box stayed with</text>
  <text x="55" y="500" fill="#0f172a" font-size="12">Grandma when she was young...</text>
  
  <!-- Save button -->
  <rect x="40" y="550" width="240" height="45" rx="22" fill="#0f172a"/>
  <text x="160" y="578" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">💾 Save memory</text>
</svg>