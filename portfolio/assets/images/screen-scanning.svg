<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 640" style="background: #0f172a;">
  <!-- Phone frame -->
  <rect x="10" y="10" width="300" height="620" rx="30" fill="#0f172a"/>
  
  <!-- Dark background -->
  <rect x="20" y="30" width="280" height="580" rx="20" fill="#0f172a"/>
  
  <!-- Spinner -->
  <circle cx="160" cy="280" r="40" fill="none" stroke="#312e81" stroke-width="4"/>
  <circle cx="160" cy="280" r="40" fill="none" stroke="#6366f1" stroke-width="4" 
    stroke-dasharray="60 191" stroke-linecap="round">
  </circle>
  
  <!-- Scanning rings -->
  <circle cx="160" cy="280" r="60" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <circle cx="160" cy="280" r="80" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  
  <!-- Text -->
  <text x="160" y="380" text-anchor="middle" fill="#6366f1" font-size="12" letter-spacing="4">SYNCING</text>
  <text x="160" y="405" text-anchor="middle" fill="#6366f1" font-size="12" letter-spacing="4">REALITY</text>
</svg>