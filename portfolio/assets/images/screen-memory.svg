<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 640" style="background: #0f172a;">
  <!-- Phone frame -->
  <rect x="10" y="10" width="300" height="620" rx="30" fill="#0f172a"/>
  
  <!-- Dark background -->
  <rect x="20" y="30" width="280" height="580" rx="20" fill="#020617"/>
  
  <!-- Top bar -->
  <rect x="40" y="50" width="60" height="30" rx="15" fill="#fff" opacity="0.1"/>
  <text x="70" y="70" text-anchor="middle" fill="#fff" font-size="10">← Back</text>
  
  <rect x="220" y="50" width="60" height="30" rx="15" fill="#fff" opacity="0.1"/>
  <text x="250" y="70" text-anchor="middle" fill="#fff" font-size="10">Grandchild</text>
  
  <!-- 3D Object area -->
  <polygon points="160,120 200,180 160,240 120,180" fill="#6366f1" opacity="0.8"/>
  <polygon points="160,240 200,180 190,260 160,280" fill="#4f46e5" opacity="0.9"/>
  <polygon points="160,240 120,180 130,260 160,280" fill="#4338ca" opacity="0.9"/>
  
  <!-- Glow -->
  <circle cx="160" cy="200" r="80" fill="url(#glow)" opacity="0.2"/>
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Story Card -->
  <rect x="40" y="320" width="240" height="160" rx="20" fill="#fff"/>
  <rect x="110" y="340" width="100" height="20" rx="10" fill="#e0e7ff"/>
  <text x="160" y="355" text-anchor="middle" fill="#4f46e5" font-size="10" font-weight="bold">RECORDED IN 1985</text>
  
  <text x="160" y="385" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="bold">Pocket Watch</text>
  
  <rect x="60" y="400" width="200" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="60" y="410" width="180" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="60" y="420" width="160" height="4" rx="2" fill="#e2e8f0"/>
  
  <text x="160" y="455" text-anchor="middle" fill="#f43f5e" font-size="20">♥</text>
  
  <!-- Message button -->
  <rect x="100" y="500" width="120" height="40" rx="20" fill="#4f46e5"/>
  <text x="160" y="525" text-anchor="middle" fill="#fff" font-size="12">View messages (2)</text>
</svg>